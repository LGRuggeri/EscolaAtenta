# ──────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — EscolaAtenta
# Disparado em: push para main/develop e em Pull Requests para main
# ──────────────────────────────────────────────────────────────────────────────

name: CI/CD — Build, Test & Deploy

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION_PATH: 'EscolaAtenta.sln'
  API_PROJECT: 'src/EscolaAtenta.API'
  INFRA_PROJECT: 'src/EscolaAtenta.Infrastructure'

jobs:
  # ── JOB 1: Build e Testes ──────────────────────────────────────────────────
  build-and-test:
    name: 🔨 Build & Testes
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: ${{ secrets.DB_USER }}
          POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
          POSTGRES_DB: ${{ secrets.DB_NAME }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔧 Configurar .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restaurar dependências
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: 🏗️ Build da solução
        run: dotnet build ${{ env.SOLUTION_PATH }} --no-restore --configuration Release

      - name: ✅ Executar testes
        run: dotnet test ${{ env.SOLUTION_PATH }} --no-build --configuration Release --verbosity normal
        env:
          # Conexão com o Postgres do service container do CI
          ConnectionStrings__DefaultConnection: >-
            Host=localhost;Port=5432;
            Database=${{ secrets.DB_NAME }};
            Username=${{ secrets.DB_USER }};
            Password=${{ secrets.DB_PASSWORD }}

  # ── JOB 2: Migração do Banco de Dados ─────────────────────────────────────
  # Roda SOMENTE em push para main (não em PRs)
  migrate-database:
    name: 🗄️ Aplicar Migrations EF Core
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔧 Configurar .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restaurar dependências
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: 📦 Instalar dotnet-ef tool
        run: dotnet tool install --global dotnet-ef

      - name: 🗄️ Aplicar migrations ao banco de dados de produção
        run: |
          dotnet ef database update \
            --project ${{ env.INFRA_PROJECT }} \
            --startup-project ${{ env.API_PROJECT }} \
            --no-build
        env:
          ASPNETCORE_ENVIRONMENT: Production
          ConnectionStrings__DefaultConnection: ${{ secrets.PROD_DB_CONNECTION_STRING }}

  # ── JOB 3: Deploy da API ───────────────────────────────────────────────────
  # Roda SOMENTE após migrations bem-sucedidas no main
  deploy-api:
    name: 🚀 Deploy da API
    runs-on: ubuntu-latest
    needs: migrate-database
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: 📥 Checkout do código
        uses: actions/checkout@v4

      - name: 🔧 Configurar .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: 📦 Restaurar dependências
        run: dotnet restore ${{ env.SOLUTION_PATH }}

      - name: 📦 Publicar API (Release)
        run: |
          dotnet publish ${{ env.API_PROJECT }} \
            --configuration Release \
            --output ./publish \
            --no-restore

      # ───────────────────────────────────────────────────────────────────────
      # Adapte este step ao seu ambiente de deploy (VPS via SSH, Azure, AWS etc.)
      # Exemplo abaixo: cópia via SCP + restart do serviço systemd
      # ───────────────────────────────────────────────────────────────────────
      - name: 🚀 Enviar artefato para o servidor
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          source: "publish/*"
          target: "/opt/escolaAtenta/api"

      - name: ♻️ Reiniciar serviço da API
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            sudo systemctl restart escolaatenta-api
            echo "✅ API reiniciada com sucesso."
